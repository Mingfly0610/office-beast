    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 模擬手機外觀的容器 - 普普風背景 */
        #app-container {
            width: 100%;
            max-width: 414px;
            min-height: 100dvh;
            background-color: #FFE500;
            background-image: radial-gradient(#111 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .page {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            padding: 24px;
            box-sizing: border-box;
            animation: fadeIn 0.4s ease-out forwards;
            overflow-y: auto;
        }

        .page.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================= 標題專屬設計 ================= */
        .title-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 2.5rem;
            margin-top: 1rem;
        }

        .title-sup {
            font-size: 1.5rem;
            font-weight: 900;
            color: #111827;
            background: #fff;
            padding: 6px 24px;
            border-radius: 24px;
            border: 2.5px solid #111;
            box-shadow: 3px 3px 0 #111;
            transform: rotate(-4deg);
            z-index: 2;
            letter-spacing: 2px;
            animation: floatUpDownSup 3s ease-in-out infinite;
            animation-delay: 0.3s;
        }

        .title-main {
            font-size: 5.5rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 2px;
            line-height: 1.1;
            text-shadow: 
                -2px -2px 0 #111827, 
                 0px -2px 0 #111827, 
                 2px -2px 0 #111827, 
                 2px  0px 0 #111827, 
                 2px  2px 0 #111827, 
                 0px  2px 0 #111827, 
                -2px  2px 0 #111827, 
                -2px  0px 0 #111827,
                4px 4px 0 #ec4899,
                7px 7px 0 #8b5cf6;
            transform: rotate(2deg);
            position: relative;
            z-index: 1;
            white-space: nowrap;
            animation: floatUpDownMain 3s ease-in-out infinite;
        }

        @keyframes floatUpDownMain {
            0%, 100% { transform: translateY(0) rotate(2deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }
        @keyframes floatUpDownSup {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-8px) rotate(-5deg); }
        }
        /* ============================================== */

        .content-z {
            z-index: 10;
            position: relative;
        }

        .quiz-option {
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        @media (hover: hover) {
            .quiz-option:not(.selected):hover {
                background-color: #FFD306;
            }
        }
        .quiz-option:active, .quiz-option.selected {
            transform: translate(4px, 4px);
            box-shadow: none !important;
            background-color: #FFD306 !important;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background-color: #111;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 900;
            z-index: 1100;
            opacity: 0;
            transition: all 0.3s;
            border: 2px solid white;
            white-space: nowrap;
        }
        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ================= 分享彈窗設計 ================= */
        #share-modal-overlay {
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #share-modal-overlay.active {
            display: block;
            opacity: 1;
        }

        #share-modal {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: white;
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            padding: 24px;
            padding-bottom: 40px;
            transform: translateY(100%);

            z-index: 1001;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
        }

        #share-modal.active {
            transform: translateY(0);
        }

        .social-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .social-btn:active {
            transform: scale(0.9);
        }

        .social-icon-box {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: white;
        }
    </style>
</head>

            showPage.classList.add('active');
        }

        function startQuiz() {
            currentQuestionIndex = 0;
            totalScore = 0;
            switchPage(pageHome, pageQuiz);
            renderQuestion();
        }

        function restartQuiz() {
            const activePage = document.querySelector('.page.active');
            switchPage(activePage, pageHome);
        }

        function renderQuestion() {
            const qData = questions[currentQuestionIndex];
            const progressPercentage = (currentQuestionIndex / questions.length) * 100;
            progressBar.style.width = `${progressPercentage}%`;
            questionCounter.textContent = `${currentQuestionIndex + 1}/${questions.length}`;

            const quizCard = document.getElementById('quiz-card');
            if(quizCard) quizCard.style.opacity = 0;

            setTimeout(() => {
                questionText.innerHTML = `Q${currentQuestionIndex + 1}. ${qData.q}`;
                optionsContainer.innerHTML = '';

                qData.options.forEach((opt) => {
                    const btn = document.createElement('button');
                    btn.className = "quiz-option w-full py-4 px-4 rounded-[20px] bg-white border-[3px] border-[#111] text-[#111] font-black text-lg text-center shadow-[4px_4px_0_#111] cursor-pointer leading-snug";
                    btn.innerHTML = `<span class="pointer-events-none">${opt.text}</span>`;
                    btn.onclick = () => handleOptionClick(btn, opt.score);
                    optionsContainer.appendChild(btn);
                });
                if(quizCard) quizCard.style.opacity = 1;
            }, 200);
        }

        function handleOptionClick(btnElement, score) {
            const allBtns = optionsContainer.querySelectorAll('button');
            allBtns.forEach(b => {
                b.onclick = null;
                b.style.pointerEvents = 'none';
            });
            
            btnElement.classList.add('selected');
            totalScore += score;

            setTimeout(() => {
                const quizCard = document.getElementById('quiz-card');
                if(quizCard) quizCard.style.opacity = 0;

                setTimeout(() => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex < questions.length) {
                        renderQuestion();
                    } else {
                        progressBar.style.width = `100%`; 
                        setTimeout(calculateAndShowResult, 300); 
                    }
                }, 300);
            }, 400);
        }

        function calculateAndShowResult() {
            let resultIndex = 0;
            if (totalScore <= 1) resultIndex = 0;
            else if (totalScore <= 3) resultIndex = 1;
            else if (totalScore <= 5) resultIndex = 2;
            else if (totalScore <= 7) resultIndex = 3;
            else if (totalScore <= 9) resultIndex = 4;
            else if (totalScore <= 11) resultIndex = 5;
            else if (totalScore <= 13) resultIndex = 6;
            else resultIndex = 7;

            const result = resultsData[resultIndex];
            currentResultTitle = result.title;

            document.getElementById('result-icon').textContent = result.icon;
            document.getElementById('result-title').textContent = result.title;
            document.getElementById('result-desc').textContent = result.desc;
            
            const today = new Date();
            document.getElementById('current-date').textContent = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;

            const tagsContainer = document.getElementById('result-tags');
            tagsContainer.innerHTML = '';
            result.tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = "px-3 py-1.5 bg-white border-[2px] border-[#111] text-[#111] rounded-full text-xs font-black shadow-[2px_2px_0_#111]";
                span.textContent = `#${tag}`;
                tagsContainer.appendChild(span);
            });
            switchPage(pageQuiz, pageResult);
        }

        // --- 分享彈窗邏輯 ---
        function showShareModal() {
            document.getElementById('share-preview-title').textContent = `我的職場神獸揭曉 - ${currentResultTitle}`;
            document.getElementById('share-modal-overlay').classList.add('active');
            setTimeout(() => {
                document.getElementById('share-modal').classList.add('active');
            }, 50);
        }

        function closeShareModal() {
            document.getElementById('share-modal').classList.remove('active');
            setTimeout(() => {
                document.getElementById('share-modal-overlay').classList.remove('active');
            }, 300);
        }

        function copyResultLink() {
            const shareText = `我剛測出我是【${currentResultTitle}】！你也來測測看你在職場裡是哪種神獸吧！\n${window.location.href}`;
            const dummy = document.createElement('input');
            document.body.appendChild(dummy);
            dummy.value = shareText;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);
            showToast("✅ 測驗連結與結果已複製！");
            closeShareModal();
        }

        function shareSocial(platform) {
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent(`我剛測出我是【${currentResultTitle}】！你也來測測看你在職場裡是哪種神獸吧！`);
            let shareUrl = "";

            switch(platform) {
                case 'fb': shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`; break;
                case 'line': shareUrl = `https://line.me/R/msg/text/?${text}%20${url}`; break;
                case 'threads': shareUrl = `https://www.threads.net/intent/post?text=${text}%20${url}`; break;
            }

            window.open(shareUrl, '_blank');
            closeShareModal();
        }
    </script>
</body>
</html>
